# Root-level pyproject.toml for sciops monorepo
[project]
name = "sciops"
requires-python = ">=3.12"
version = "0.0.0"
keywords = ["sciops", "ai"]

[dependency-groups]
dev = [
   { include-group = "lint" }
]
lint = [
    "ruff==0.15.5",
    "ty==0.0.24",
]

[tool.ruff]
# Maximum line length
line-length = 100
target-version = "py312"
extend-include = ["*.ipynb"]

[tool.ruff.format]
preview = true
docstring-code-format = true

[tool.ruff.lint]
preview = true
# Select rules to check
select = ["E", "F", "W", "C", "I"]  # Errors, F-strings, Warnings, Complexity, Imports

[tool.ty.rules]
unresolved-import = "ignore"

[tool.ty.src]
include = [
    "**/src",
]

[tool.ty.environment]
python-platform = "all"
