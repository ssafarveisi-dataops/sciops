name: Code Formatting and Linting Checks

on:
  pull_request:
    branches: [ main ]

jobs:
  format-check:
    name: Code Formatting Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.11"
          enable-cache: false
      - name: Run Ruff format check
        run: uv run --frozen --only-group lint ruff format --check --output-format github --preview .
      - name: Run Ruff lint check
        run: uv run --frozen --only-group lint ruff check --output-format github .
      - name: Run Ty type check
        run: uv run --frozen --only-group lint ty check --output-format github .
