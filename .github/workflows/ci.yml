name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  format-check:
    name: Tests (Pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.11"
      - name: Install Dev Dependencies
        run: uv sync --locked --all-groups
      - name: Test inference package
        run: uv run pytest
        working-directory: src/inference
